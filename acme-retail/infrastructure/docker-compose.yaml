services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: 300-Agents-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: 300-Agents-postgres
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qdrant-data:
  postgres-data: